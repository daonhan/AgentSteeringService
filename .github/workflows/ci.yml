name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - run: dotnet restore AgentSteeringService.csproj

      - run: dotnet build AgentSteeringService.csproj --no-restore -c Release

      - name: Verify formatting
        run: dotnet format AgentSteeringService.csproj --verify-no-changes
