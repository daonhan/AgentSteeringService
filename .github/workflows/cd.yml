name: CD

on:
  push:
    branches: [main]
    # Path filter (Phase 6): a code- or docs-only commit must not run an infra
    # apply or raise a prod approval. Only infra/workflow changes trigger delivery.
    paths:
      - "infra/**"
      - ".github/workflows/cd.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/cd.yml"
  schedule:
    # Daily drift detection (Phase 6): plan-only, never applies. See the `drift` job.
    - cron: "0 6 * * *"
  workflow_dispatch: # manual trigger for testing / emergency apply

permissions:
  contents: read

env:
  TF_VERSION: "1.9.8"

jobs:
  # ---- PR review path (Phase 2): static gates + plan comment + scoped Checkov gate ----

  terraform-validate:
    name: Terraform fmt + validate (gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: infra
        run: terraform init -input=false -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate -no-color

  terraform-plan:
    name: Terraform plan (dev) → PR comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      # OIDC federation (Phase 7): no client secret. ARM_USE_OIDC makes the azurerm
      # provider request a GitHub workload-identity token (ACTIONS_ID_TOKEN_REQUEST_*);
      # the client/tenant/subscription IDs are non-secret identifiers.
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false -backend-config=environments/dev.backend.hcl

      - name: Terraform plan (dev)
        id: plan
        working-directory: infra
        # -lock=false: a PR preview is read-only; do not contend with a main apply.
        run: terraform plan -input=false -lock=false -var-file=environments/dev.tfvars -no-color
        continue-on-error: true

      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- terraform-plan-dev -->';
            let plan = process.env.PLAN_STDOUT || '(no plan output captured)';
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated)';
            const body = [
              marker,
              `## Terraform dev plan — \`${process.env.PLAN_OUTCOME}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '</details>',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  checkov:
    name: Checkov scan + scoped hardening gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Scoped hard gate (Phase 2): only the transport/public-access hardening rules
    # below block the PR; every other Checkov finding is reported in the comment but
    # never fails the job, so one opinionated rule can't wedge the pipeline.
    #   CKV_AZURE_70  — Function App HTTPS-only       (forward-looking: the Flex
    #   CKV_AZURE_145 — Function App minimum TLS 1.2   Consumption resource has no
    #                                                  Checkov coverage yet, so these
    #                                                  are inert today but activate if
    #                                                  coverage lands / the type changes)
    #   CKV_AZURE_44  — Storage account minimum TLS 1.2 (enforced now)
    #   CKV_AZURE_190 — Storage blobs restrict public access (enforced now)
    env:
      CHECKOV_GATE_CHECKS: CKV_AZURE_70,CKV_AZURE_145,CKV_AZURE_44,CKV_AZURE_190
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install --disable-pip-version-check checkov

      - name: Run Checkov (full, informational)
        id: checkov
        working-directory: infra
        # Full scan: capture every finding for the PR comment but never fail here.
        run: |
          set +e
          checkov --directory . --framework terraform --compact --quiet --output cli > checkov_output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post Checkov results as PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          CHECKOV_EXIT: ${{ steps.checkov.outputs.exit_code }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- checkov-scan -->';
            let report = '';
            try {
              report = fs.readFileSync('infra/checkov_output.txt', 'utf8');
            } catch (e) {
              report = 'Checkov produced no output.';
            }
            const max = 60000;
            if (report.length > max) report = report.slice(0, max) + '\n... (truncated)';
            const status = (process.env.CHECKOV_EXIT === '0')
              ? '✅ no failed checks'
              : '⚠️ findings reported (informational — only the scoped hardening rules block)';
            const body = [
              marker,
              `## Checkov security scan — ${status}`,
              '',
              'Findings below are informational. The scoped transport/public-access hardening',
              'rules are enforced by a separate blocking step on this job.',
              '',
              '<details><summary>Show report</summary>',
              '',
              '```',
              report,
              '```',
              '</details>',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Checkov scoped hardening gate (blocking)
        working-directory: infra
        # Required check: fails the PR if any scoped transport/public-access rule
        # regresses. No `set +e` — a non-zero Checkov exit fails the job.
        run: checkov --directory . --framework terraform --check "$CHECKOV_GATE_CHECKS" --compact --quiet --output cli

  # ---- Delivery path (Phase 1): apply + deploy dev on push to main ----

  apply-dev:
    name: Apply dev infrastructure
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: dev
    # Serialize applies on the branch ref so two quick pushes can't run overlapping
    # applies against shared state; cancel-in-progress:false never kills a live apply.
    concurrency:
      group: terraform-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      function_app_name: ${{ steps.tf-outputs.outputs.function_app_name }}
      resource_group_name: ${{ steps.tf-outputs.outputs.resource_group_name }}
    env:
      # OIDC federation (Phase 7): no client secret. ARM_USE_OIDC makes the azurerm
      # provider request a GitHub workload-identity token (ACTIONS_ID_TOKEN_REQUEST_*);
      # the client/tenant/subscription IDs are non-secret identifiers.
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false -backend-config=environments/dev.backend.hcl

      - name: Terraform plan
        working-directory: infra
        run: terraform plan -input=false -var-file=environments/dev.tfvars -out=tfplan

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -input=false tfplan

      - name: Export Terraform outputs
        id: tf-outputs
        working-directory: infra
        run: |
          echo "function_app_name=$(terraform output -raw function_app_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

  deploy-dev:
    name: Deploy dev Function App
    needs: apply-dev
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish AgentSteeringService.csproj -c Release -o ./publish

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.apply-dev.outputs.function_app_name }}
          package: ./publish

  # ---- Prod promotion (Phase 3): plan → [prod approval] → apply saved plan → deploy ----
  # plan-prod runs ungated so the reviewer can inspect the exact change set before
  # approving. The approval gate lives on apply-prod / deploy-prod via the `prod`
  # GitHub Environment (required reviewer = operator), so nothing is provisioned or
  # deployed to prod until a human approves. apply-prod applies the byte-for-byte
  # tfplan that plan-prod produced (plan integrity).

  plan-prod:
    name: Plan prod infrastructure
    needs: deploy-dev
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      # OIDC federation (Phase 7): no client secret. ARM_USE_OIDC makes the azurerm
      # provider request a GitHub workload-identity token (ACTIONS_ID_TOKEN_REQUEST_*);
      # the client/tenant/subscription IDs are non-secret identifiers.
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false -backend-config=environments/prod.backend.hcl

      - name: Terraform plan
        working-directory: infra
        run: terraform plan -input=false -var-file=environments/prod.tfvars -out=tfplan

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/tfplan
          retention-days: 1

  apply-prod:
    name: Apply prod infrastructure
    needs: plan-prod
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: prod
    # Same non-cancelling group as apply-dev: prod and dev applies on this ref
    # serialize, and an in-flight apply is never cancelled by a newer push.
    concurrency:
      group: terraform-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      function_app_name: ${{ steps.tf-outputs.outputs.function_app_name }}
      resource_group_name: ${{ steps.tf-outputs.outputs.resource_group_name }}
    env:
      # OIDC federation (Phase 7): no client secret. ARM_USE_OIDC makes the azurerm
      # provider request a GitHub workload-identity token (ACTIONS_ID_TOKEN_REQUEST_*);
      # the client/tenant/subscription IDs are non-secret identifiers.
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false -backend-config=environments/prod.backend.hcl

      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra

      - name: Terraform apply (saved plan)
        working-directory: infra
        run: terraform apply -input=false tfplan

      - name: Export Terraform outputs
        id: tf-outputs
        working-directory: infra
        run: |
          echo "function_app_name=$(terraform output -raw function_app_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

  deploy-prod:
    name: Deploy prod Function App
    needs: apply-prod
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish AgentSteeringService.csproj -c Release -o ./publish

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.apply-prod.outputs.function_app_name }}
          package: ./publish

  # ---- Scheduled drift detection (Phase 6): plan-only, alerts on exit code 2 ----
  # Runs daily against each environment's real state. `terraform plan
  # -detailed-exitcode` returns 2 when state has drifted from config (an out-of-band
  # portal change). The job surfaces that as a warning annotation and fails to alert;
  # it never applies. Read-only, so it is not behind the prod approval Environment.

  drift:
    name: Drift detection (${{ matrix.environment }})
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]
    env:
      # OIDC federation (Phase 7): no client secret. ARM_USE_OIDC makes the azurerm
      # provider request a GitHub workload-identity token (ACTIONS_ID_TOKEN_REQUEST_*);
      # the client/tenant/subscription IDs are non-secret identifiers.
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # wrapper off so the step sees terraform's real -detailed-exitcode value.
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false -backend-config=environments/${{ matrix.environment }}.backend.hcl

      - name: Terraform plan (drift detection)
        working-directory: infra
        # -lock=false keeps this read-only check from contending with a live apply.
        # No -out and no apply step: drift is reported, never reconciled here.
        run: |
          set +e
          terraform plan -input=false -lock=false -detailed-exitcode \
            -var-file=environments/${{ matrix.environment }}.tfvars -no-color
          code=$?
          set -e
          if [ "$code" = "2" ]; then
            echo "::warning title=Terraform drift::${{ matrix.environment }} has drifted — plan shows changes outside Terraform."
            exit 2
          elif [ "$code" = "1" ]; then
            echo "::error title=Terraform plan failed::drift check for ${{ matrix.environment }} errored."
            exit 1
          fi
          echo "No drift detected in ${{ matrix.environment }}."
