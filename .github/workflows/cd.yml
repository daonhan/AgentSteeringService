name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_VERSION: "1.9.8"

jobs:
  apply-dev:
    name: Apply dev infrastructure
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      function_app_name: ${{ steps.tf-outputs.outputs.function_app_name }}
      resource_group_name: ${{ steps.tf-outputs.outputs.resource_group_name }}
    env:
      ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
      ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false -backend-config=environments/dev.backend.hcl

      - name: Terraform plan
        working-directory: infra
        run: terraform plan -input=false -var-file=environments/dev.tfvars -out=tfplan

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -input=false tfplan

      - name: Export Terraform outputs
        id: tf-outputs
        working-directory: infra
        run: |
          echo "function_app_name=$(terraform output -raw function_app_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

  deploy-dev:
    name: Deploy dev Function App
    needs: apply-dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish AgentSteeringService.csproj -c Release -o ./publish

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.apply-dev.outputs.function_app_name }}
          package: ./publish
